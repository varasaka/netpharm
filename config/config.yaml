# ============================================================================
# Network Pharmacology Platform — configuration
# Every threshold, path, and switch the pipeline uses lives here.
# Agents read this; they never hard-code parameters.
# ============================================================================

run:
  plant: "Withania somnifera"        # scientific name (Agent 1 input)
  disease: "Type 2 diabetes mellitus" # disease query (Agent 5 input)
  species_taxon: 9606                 # human = 9606 (STRING / target prediction)
  output_dir: "outputs"
  db_path: "outputs/netpharm.sqlite"  # intermediate storage + checkpoints
  # Start the graph fresh, or resume from the last completed step.
  # The orchestrator skips any step whose output already exists in the DB.
  resume: true

llm:
  # Report generation (Agent 11) uses the Claude API.
  # Key is read from the ANTHROPIC_API_KEY environment variable, never from here.
  model: "claude-opus-4-8"
  max_tokens: 4000

extractor:
  sources: ["imppat", "pubchem"]      # chebi / npass are optional hooks
  imppat_base: "https://cb.imsc.res.in/imppat"
  pubchem_base: "https://pubchem.ncbi.nlm.nih.gov/rest/pug"
  request_timeout: 30
  max_compounds: 0                    # 0 = no cap

adme:
  # SwissADME has no public API; this drives the Playwright agent.
  swissadme_url: "http://www.swissadme.ch/"
  headless: true
  rules:
    lipinski_violations_max: 1        # keep compounds with <= N Lipinski violations
    gi_absorption: ["High"]           # keep only these GI-absorption classes
    bioavailability_min: 0.30         # Abbott bioavailability score cutoff
    exclude_pains_alerts: true        # drop compounds with any PAINS alert

targets:
  swiss_target_url: "http://www.swisstargetprediction.ch/"
  probability_min: 0.10               # keep predictions above this probability
  headless: true

disease:
  sources: ["disgenet", "genecards", "omim"]
  disgenet_base: "https://www.disgenet.org/api"
  # DisGeNET now requires an API key for most endpoints; set DISGENET_API_KEY.
  relevance_score_min: 0.10

ppi:
  string_base: "https://string-db.org/api"
  min_score: 400                      # STRING combined score (0-1000). 400 = medium.
  network_flavor: "confidence"

enrichment:
  provider: "enrichr"                 # enrichr | gprofiler
  enrichr_base: "https://maayanlab.cloud/Enrichr"
  libraries:
    - "GO_Biological_Process_2023"
    - "GO_Molecular_Function_2023"
    - "GO_Cellular_Component_2023"
    - "KEGG_2021_Human"
    - "Reactome_2022"
  adj_pvalue_max: 0.05
  top_n: 20

cytoscape:
  cyrest_base: "http://127.0.0.1:1234"  # Cytoscape must be running locally
  export_dpi: 600
  styles:
    compound: "#2E7D32"   # green
    target:   "#1565C0"   # blue
    disease:  "#C62828"   # red
    pathway:  "#EF6C00"   # orange
    hub:      "#F9A825"   # highlighted hubs
  export_formats: ["png", "svg", "pdf", "graphml", "xgmml", "cys"]

hub_genes:
  methods: ["Degree", "Betweenness", "Closeness", "MCC", "MNC", "DMNC"]
  top_n: 10

report:
  formats: ["markdown", "docx", "pdf", "html"]
  title: "Network Pharmacology Analysis"
