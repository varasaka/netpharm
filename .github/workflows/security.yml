name: Security Scan

on:

  schedule:

    - cron: "0 3 * * 1"

  workflow_dispatch:

jobs:

  scan:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install pip-audit bandit

      - run: |
          pip-audit

      - run: |
          bandit -r src
