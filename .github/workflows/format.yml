name: Auto Format

on:

  workflow_dispatch:

jobs:

  format:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install black isort

      - run: |
          black .
          isort .

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto format"
