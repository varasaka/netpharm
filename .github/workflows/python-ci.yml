name: Python CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e . || true

      - name: Run linters (if present)
        run: |
          if [ -f setup.cfg ] || [ -f pyproject.toml ] || command -v flake8 >/dev/null 2>&1; then
            pip install flake8 || true
            flake8 || true
          else
            echo "No linter configuration found; skipping flake8"
          fi

      - name: Run tests
        run: |
          pip install pytest || true
          if [ -f pytest.ini ] || [ -d tests ] || [ -f setup.cfg ] || [ -f pyproject.toml ]; then
            pytest -q || true
          else
            echo "No tests detected; skipping pytest"
          fi
